services:
  unoassist:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: unoassist
    cpus: "2.0"
    env_file:
      - .env
    ports:
      - "3030:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
    restart: unless-stopped
    networks:
      - 1panel-network

networks:
  1panel-network:
    external: true
