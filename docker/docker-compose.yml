services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: academic_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/migration.sql:/docker-entrypoint-initdb.d/01-migration.sql:ro
      - ../scripts/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d academic_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10

  # TODO: Add an Ollama service here when the local LLM runtime is required.
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"

volumes:
  postgres_data:

